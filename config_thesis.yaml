model:
  dialogue_state_tracker:
    bert_model: bert-base-uncased
    hidden_dim: 256
    num_intents: 10
    num_slots: 15
    num_layers: 2
    context_encoder_layers: 2
    dropout: 0.3
    state_dim: 512
    freeze_bert: false
  personalization:
    hidden_dim: 256
    profile_dim: 128
    static_features_dim: 64
    item_embedding_dim: 128
    user_embedding_dim: 128
    attention_heads: 4
    dropout: 0.3
    cold_start:
      enabled: true
    thompson_sampling:
      enabled: true
      num_samples: 1
      apply_in_eval: false
  policy:
    state_dim: 1024
    action_dim: 4
    hidden_dim: 512
    num_objectives: 4
    dropout: 0.3
    objective_weights:
      accuracy: 0.4
      diversity: 0.25
      fairness: 0.2
      engagement: 0.15
  diversity_fairness:
    hidden_dim: 256
    lambda_mmr: 0.7
    diversity_window: 20
    min_diversity: 0.35
    min_fairness: 0.90
    item_embedding_dim: 128
    user_embedding_dim: 128
    fairness_thresholds:
      demographic_parity: 0.1
      equal_opportunity: 0.1
      calibration: 0.15
      exposure: 0.6
      provider: 0.6
    max_head_share_top5: 0.40
    max_head_share_top10: 0.35
    max_head_share_top20: 0.35
  explanation_generator:
    vocab_size: 10000
    embedding_dim: 256
    hidden_dim: 256
    context_dim: 640
    num_explanation_types: 5
    max_length: 50
    generation_mode: template
training:
  num_epochs: 10
  save_frequency: 1
  num_episodes: 20000
  num_envs: 10
  max_turns_per_episode: 20
  batch_size: 64
  learning_rate: 0.0002
  value_lr: 0.0008
  ppo:
    epochs: 6
    clip_epsilon: 0.15
    gamma: 0.99
    lambda_gae: 0.95
    max_grad_norm: 0.5
    entropy_coef: 0.05
    value_loss_coef: 0.5
  epsilon_start: 0.15
  epsilon_end: 0.02
  epsilon_decay: 0.9997
  buffer_size: 100000
  min_buffer_size: 5000
  behavioral_cloning:
    enabled: true
    epochs: 30
    learning_rate: 0.0005
  eval_interval: 100
  save_interval: 500
  log_interval: 10
  rl:
    use_full_dataset: true
    max_conversations: 10000
    passes_over_data: 4
    candidate_pool_size: 180
    exploration_recommend_bias: 0.15
    top_k_recommendations: 10
    rollout_horizon: 20
    ppo_minibatch_size: 512
    updates_per_rollout: 6
    normalize_advantages: true
    eval_interval_episodes: 100
    save_interval_episodes: 500
    min_turns_before_end: 5
    constraint_aware:
      enabled: true
      penalty_coef: 0.35
    ask_before_recommend_turns: 1
    reward_weights:
      accuracy: 0.24
      diversity: 0.12
      fairness: 0.40
      engagement: 0.24
data:
  dataset_name: ReDial
  data_root: ./data
  data_dir: ./data/ReDial
  processed_dir: ./data/ReDial/processed
  train_file: ./data/ReDial/train_data.json
  val_file: ./data/ReDial/val_data.json
  test_file: ./data/ReDial/test_data.json
  full_data_file: ./data/ReDial/train_data.json
  max_dialogue_length: 20
  max_utterance_length: 128
  min_item_interactions: 5
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15
  stronger_validation:
    enabled: false
    val_ratio: 0.15
    test_ratio: 0.15
    stratify_by: demographic_success
    min_group_samples: 5
  catalog_file: ./data/ReDial/item_catalog.json
  item_features_dim: 128
  num_items: 6924
evaluation:
  metrics:
  - success_rate
  - average_turns
  - precision_at_k
  - recall_at_k
  - ndcg
  - diversity_ild
  - diversity_coverage
  - fairness_demographic_parity
  - fairness_exposure_gini
  - user_satisfaction
  k_values:
  - 1
  - 5
  - 10
  num_eval_episodes: 300
  ips_clip_c: 10.0
environment:
  max_turns: 20
  reward_success: 12.0
  reward_reject: -4.0
  reward_per_turn: -0.1
  reward_ask_preference: 1.0
  reward_clarify: 0.6
  reward_reject_engagement: -1.5
  reward_recommend_attempt_bonus: 0.15
  non_recommend_streak_penalty: 0.1
  non_recommend_streak_penalty_max: 1.0
  min_turns_before_end: 3
  early_end_penalty: 6.0
  reward_diversity_factor: 4.0
  reward_fairness_factor: 12.0
  reward_engagement_factor: 6.0
  early_recommend_penalty: 0.4
  reward_end_without_success: -2.0
  reward_end_without_recommendation: -3.0
  reward_head_item_penalty: 1.4
  reward_tail_item_bonus: 1.2
logging:
  log_dir: ./logs
  experiment_name: mocrs_thesis_profile
  use_wandb: true
  wandb_project: mocrs-thesis
  save_dir: ./checkpoints
hardware:
  device: cuda
  gpu_id: 0
  num_workers: 2
  pin_memory: true
seed: 42
